# Firebase App Hosting turns this source into a container using Google Cloud
# buildpacks and deploys it to its managed Cloud Run runtime.
runConfig:
  minInstances: 0
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 512

env:
  - variable: APP_ENV
    value: production
    availability:
      - BUILD
      - RUNTIME
  - variable: LOG_LEVEL
    value: info
    availability:
      - RUNTIME
  - variable: NEXT_PUBLIC_APP_NAME
    value: Public Meeting Follow-Up Kit
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_APP_DESCRIPTION
    value: Draft public meeting summaries, action trackers, FAQs, and follow-up plans from approved records.
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_SITE_URL
    value: https://public-meeting-kit.example
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_DEMO_MODE
    value: "true"
    availability:
      - BUILD
      - RUNTIME

# Add secrets with:
#   npx firebase apphosting:secrets:set SECRET_NAME
# Then reference them here without committing a value:
#  - variable: SECRET_NAME
#    secret: SECRET_NAME
